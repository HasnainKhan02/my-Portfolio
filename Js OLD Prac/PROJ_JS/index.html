<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
      body {
        height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", sans-serif;
      }
      .box {
        border: 1px solid black;
        border-radius: 10px;
        width: 90%;
        max-width: 400px;
        /* max-height: 70vh; */
        padding: 25px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        text-align: center;
        overflow: hidden;
      }
      button {
        padding: 14px 26px;
        background-color: orange;
        border: none;
        color: #fff;
        border-radius: 8px;
        width: 100%;
      }
      .try {
        background-color: blue;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 15px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
      }
      .hading span {
        font-size: 2em;
        font-weight: bolder;
      }
      .Attempts {
        color: gray;
      }
      .guess {
        margin-top: 5px;
        color: #555;
      }
      @media (max-width: 480px) {
        .box {
          width: 95%;
          padding: 20px;
        }

        .hading span {
          font-size: 1.4em;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="hading">
        <span>Number Guessing Game</span>
      </div>
      <div class="guessus">
        <input id="inp" type="number" />
      </div>
      <button class="check-button">Check Guess</button>
      <button class="try">Try Again</button>
      <div>
        <p class="result">Result will Appear here</p>
        <p class="Previous"></p>
        <p class="Attempts">Attempts : 10</p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
